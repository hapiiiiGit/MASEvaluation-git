version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: alnokhba_mysql
    restart: always
    environment:
      MYSQL_DATABASE: al_nokhba_db
      MYSQL_USER: alnokhba_user
      MYSQL_PASSWORD: your_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: alnokhba_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn backend.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings
      - MYSQL_DATABASE=al_nokhba_db
      - MYSQL_USER=alnokhba_user
      - MYSQL_PASSWORD=your_password
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
      - DEBUG=1

  frontend:
    build:
      context: ../al_nokhba_accounting_system_1766980434
    container_name: alnokhba_frontend
    command: npm start
    volumes:
      - ../al_nokhba_accounting_system_1766980434:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - CHOKIDAR_USEPOLLING=true
      - REACT_APP_API_URL=http://localhost:8000

volumes:
  db_data: