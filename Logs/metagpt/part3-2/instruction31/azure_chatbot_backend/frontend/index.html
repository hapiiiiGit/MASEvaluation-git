<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chatbot-container">
        <header class="chatbot-header">
            <h1>Azure Chatbot</h1>
            <p class="subtitle">Powered by OpenAI · Secure · Fast</p>
        </header>
        <main class="chatbot-main">
            <div id="chat-window" class="chat-window" aria-live="polite" aria-atomic="false">
                <!-- Chat messages will be dynamically inserted here -->
            </div>
            <form id="chat-form" class="chat-form" autocomplete="off">
                <input 
                    type="text" 
                    id="user-input" 
                    class="chat-input" 
                    placeholder="Type your message..." 
                    autocomplete="off" 
                    required 
                    aria-label="Type your message"
                />
                <button type="submit" class="send-btn" aria-label="Send message">
                    <span>Send</span>
                </button>
            </form>
        </main>
        <footer class="chatbot-footer">
            <span>© 2024 Azure Chatbot. All rights reserved.</span>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
