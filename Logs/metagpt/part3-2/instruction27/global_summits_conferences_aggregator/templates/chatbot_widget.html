<!-- chatbot_widget.html -->
<div id="chatbot-container" style="position: fixed; bottom: 24px; right: 24px; z-index: 9999;">
    <div id="chatbot-toggle" style="cursor: pointer; background: #007bff; color: #fff; border-radius: 50%; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.2);">
        <span style="font-size: 2rem;">💬</span>
    </div>
    <div id="chatbot-window" style="display: none; width: 350px; max-width: 90vw; height: 480px; background: #fff; border-radius: 12px; box-shadow: 0 2px 16px rgba(0,0,0,0.25); overflow: hidden; flex-direction: column;">
        <div style="background: #007bff; color: #fff; padding: 12px 16px; font-weight: bold; display: flex; justify-content: space-between; align-items: center;">
            <span>SummitBot - AI Assistant</span>
            <button id="chatbot-close" type="button" style="background: none; border: none; color: #fff; font-size: 1.2rem; cursor: pointer;">&times;</button>
        </div>
        <div id="chatbot-messages" style="flex: 1; padding: 16px; overflow-y: auto; background: #f8f9fa;">
            <!-- Messages will be dynamically loaded here -->
            <div class="chatbot-message chatbot-message-bot" style="margin-bottom: 12px;">
                <div style="background: #e9ecef; border-radius: 8px; padding: 8px 12px; display: inline-block;">
                    👋 Hi! I'm SummitBot. How can I help you today?<br>
                    <small>Ask me about events, tickets, speakers, or anything else!</small>
                </div>
            </div>
        </div>
        <form id="chatbot-form" style="display: flex; border-top: 1px solid #dee2e6; background: #fff;">
            <input type="text" id="chatbot-input" autocomplete="off" placeholder="Type your message..." style="flex: 1; border: none; padding: 12px; font-size: 1rem; outline: none;">
            <button type="submit" style="background: #007bff; color: #fff; border: none; padding: 0 18px; font-size: 1.2rem; cursor: pointer;">&#9658;</button>
        </form>
    </div>
</div>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const toggle = document.getElementById('chatbot-toggle');
    const windowEl = document.getElementById('chatbot-window');
    const closeBtn = document.getElementById('chatbot-close');
    const form = document.getElementById('chatbot-form');
    const input = document.getElementById('chatbot-input');
    const messages = document.getElementById('chatbot-messages');

    toggle.addEventListener('click', function() {
        windowEl.style.display = 'flex';
        toggle.style.display = 'none';
    });

    closeBtn.addEventListener('click', function() {
        windowEl.style.display = 'none';
        toggle.style.display = 'flex';
    });

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const userMsg = input.value.trim();
        if (!userMsg) return;
        appendMessage('user', userMsg);
        input.value = '';
        // Send message to backend API (AJAX)
        fetch('/api/chatsessions/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify({ message: userMsg })
        })
        .then(response => response.json())
        .then(data => {
            if (data && data.reply) {
                appendMessage('bot', data.reply);
            } else {
                appendMessage('bot', "Sorry, I couldn't understand that. Please try again.");
            }
        })
        .catch(() => {
            appendMessage('bot', "Sorry, there was a problem connecting to the server.");
        });
    });

    function appendMessage(sender, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'chatbot-message chatbot-message-' + sender;
        msgDiv.style.marginBottom = '12px';
        const bubble = document.createElement('div');
        bubble.style.borderRadius = '8px';
        bubble.style.padding = '8px 12px';
        bubble.style.display = 'inline-block';
        bubble.style.background = sender === 'user' ? '#d1e7dd' : '#e9ecef';
        bubble.textContent = text;
        msgDiv.appendChild(bubble);
        messages.appendChild(msgDiv);
        messages.scrollTop = messages.scrollHeight;
    }

    // Helper to get CSRF token
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
});
</script>
<style>
#chatbot-container { font-family: 'Segoe UI', Arial, sans-serif; }
.chatbot-message-user div { background: #d1e7dd !important; text-align: right; }
.chatbot-message-bot div { background: #e9ecef !important; text-align: left; }
#chatbot-window { flex-direction: column; }
#chatbot-messages { max-height: 340px; }
#chatbot-form input { border-radius: 0; }
#chatbot-form button { border-radius: 0; }
</style>
