<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document Summarizer & Formula Builder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Link to style.css for basic styling -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Document Summarizer & Formula Builder</h1>
    </header>
    <main>
        <!-- Document Upload Section -->
        <section id="upload-section">
            <h2>Upload Documents</h2>
            <form id="upload-form" enctype="multipart/form-data">
                <input type="file" id="file-input" name="files" multiple accept=".pdf,.doc,.docx,.txt">
                <button type="submit">Upload</button>
            </form>
            <div id="upload-status"></div>
        </section>

        <!-- Uploaded Documents and Summaries Section -->
        <section id="documents-section">
            <h2>Your Documents & Summaries</h2>
            <div id="documents-list">
                <!-- Dynamically populated list of documents and summaries -->
            </div>
        </section>

        <!-- Formula Builder Section -->
        <section id="formula-section">
            <h2>Formula Builder</h2>
            <form id="formula-form">
                <label for="formula-name">Formula Name:</label>
                <input type="text" id="formula-name" name="formula-name" required>
                <label for="formula-expression">Expression:</label>
                <input type="text" id="formula-expression" name="formula-expression" placeholder="e.g. (A + B) / C" required>
                <button type="submit">Save Formula</button>
            </form>
            <div id="formula-status"></div>
            <h3>Saved Formulas</h3>
            <div id="saved-formulas-list">
                <!-- Dynamically populated list of saved formulas -->
            </div>
            <h3>Evaluate Formula</h3>
            <form id="evaluate-form">
                <label for="select-formula">Select Formula:</label>
                <select id="select-formula" name="select-formula">
                    <!-- Dynamically populated options -->
                </select>
                <div id="formula-variables">
                    <!-- Dynamically generated variable input fields -->
                </div>
                <button type="submit">Evaluate</button>
            </form>
            <div id="evaluation-result"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 Document Summarizer & Formula Builder</p>
    </footer>
    <script src="app.js"></script>
</body>
</html>
