# Configuration for Python Windows Deployment Tool
python_version: "3.11.8"
python_install_path: "C:/Python3118"
requirements_path: "requirements.txt"
build_output_dir: "dist"
packager: "pyinstaller"  # or "cx_freeze"
log_file: "deployment.log"
log_level: "INFO"

# Environment variables to set (system and user)
env_vars:
  PYTHONHOME: "C:/Python3118"
  PYTHONPATH: "C:/Python3118/Lib"

# Additional dependency paths to add to PATH
dependency_paths:
  - "C:/Python3118/Scripts"
  - "C:/Python3118/Lib/site-packages"

update_path: true

# Test users for multi-user testing (username/password pairs)
test_users:
  - username: "TestUser1"
    password: "password1"
  - username: "TestUser2"
    password: "password2"

test_args: []  # Optional arguments to pass to the executable during testing
test_timeout: 30

# Main script to compile (can be overridden by CLI)
main_script: "example_script.py"
